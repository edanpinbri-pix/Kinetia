<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetia</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="panel">
    <!-- Header -->
    <div class="header">
      <span class="logo">Kinetia</span>
      <span class="version">v1.0</span>
    </div>

    <!-- Import section -->
    <div class="section">
      <h2 class="section-title">Import Package</h2>
      <button id="btn-import" class="btn btn-primary btn-full">
        Open .kinetia file...
      </button>
      <div id="package-info" class="package-info hidden">
        <span id="package-name" class="package-name"></span>
        <span id="package-layers" class="package-meta"></span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Physics editor -->
    <div class="section" id="physics-section">
      <h2 class="section-title">Physics Modifiers</h2>
      <p class="hint">Adjustments apply to all mapped layers.</p>

      <div id="physics-params">
        <!-- Generated by panel.js -->
      </div>

      <button id="btn-apply" class="btn btn-primary btn-full" disabled>
        Apply to composition
      </button>
      <button id="btn-randomize" class="btn btn-ghost btn-full" disabled>
        Randomize ±10%
      </button>
    </div>

    <div class="divider"></div>

    <!-- NL Guide (Phase 2.5) -->
    <div class="section">
      <h2 class="section-title">Natural Language Guide</h2>
      <textarea
        id="nl-prompt"
        class="nl-input"
        placeholder="e.g. Make it softer and more elegant..."
        rows="3"
      ></textarea>
      <button id="btn-nl-apply" class="btn btn-accent btn-full" disabled>
        Apply guide
      </button>
    </div>

    <div class="divider"></div>

    <!-- Status bar -->
    <div class="status-bar">
      <span id="status-text">Ready</span>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
